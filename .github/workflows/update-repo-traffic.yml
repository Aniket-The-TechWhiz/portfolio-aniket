name: Update Repo Traffic Metrics

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-traffic:
    if: ${{ secrets.GH_TRAFFIC_TOKEN != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch repository traffic metrics
        uses: actions/github-script@v7
        env:
          OWNER: Aniket-The-TechWhiz
          OUTPUT_FILE: data/repo-traffic.json
          MAX_REPOS: "20"
        with:
          github-token: ${{ secrets.GH_TRAFFIC_TOKEN }}
          script: |
            const fs = require('fs');

            const owner = process.env.OWNER;
            const outputFile = process.env.OUTPUT_FILE;
            const maxRepos = Number(process.env.MAX_REPOS || '20');

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              sort: 'pushed',
              direction: 'desc',
              per_page: 100,
              type: 'owner'
            });

            const activeRepos = repos
              .filter(repo => !repo.fork && !repo.archived)
              .slice(0, maxRepos);

            const result = [];

            for (const repo of activeRepos) {
              try {
                const { data } = await github.rest.repos.getViews({
                  owner,
                  repo: repo.name,
                  per: 'day'
                });

                result.push({
                  name: repo.name,
                  viewsCount: data.count || 0,
                  uniqueVisitors: data.uniques || 0,
                  fetchedAt: new Date().toISOString()
                });
              } catch (error) {
                core.warning(`Could not fetch traffic for ${repo.name}: ${error.message}`);
                result.push({
                  name: repo.name,
                  viewsCount: 0,
                  uniqueVisitors: 0,
                  fetchedAt: new Date().toISOString(),
                  error: 'traffic_unavailable'
                });
              }
            }

            const payload = {
              generatedAt: new Date().toISOString(),
              repos: result
            };

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync(outputFile, JSON.stringify(payload, null, 2) + '\n');

      - name: Commit updated traffic file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/repo-traffic.json
          if git diff --staged --quiet; then
            echo "No traffic changes to commit"
            exit 0
          fi
          git commit -m "chore: update repo traffic metrics"
          git push
